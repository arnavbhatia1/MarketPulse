project:
  name: "MarketPulse"
  version: "1.0.0"

data:
  mode: "auto"  # "live" | "auto" (news RSS always available, no fallback needed)
  storage:
    raw_dir: "data/raw"
    labeled_dir: "data/labeled"
    model_dir: "data/models"

ingestion:
  news:
    query_terms: ["stock market", "earnings", "IPO", "SEC", "Fed",
                  "Wall Street", "S&P 500", "Nasdaq", "Dow Jones",
                  "tech stocks", "AI stocks", "energy stocks", "bank stocks"]
    symbols: [
      "AAPL", "MSFT", "NVDA", "AMZN", "GOOGL", "META", "TSLA", "AVGO", "JPM", "V",
      "UNH", "XOM", "LLY", "MA", "HD", "PG", "COST", "JNJ", "MRK", "ABBV",
      "CVX", "BAC", "WMT", "KO", "NFLX", "PEP", "DIS", "ADBE", "AMD", "INTC",
      "CRM", "PYPL", "QCOM", "TXN", "CSCO", "NEE", "RTX", "CAT", "GS", "AMGN",
      "T", "VZ", "PFE", "BMY", "SBUX", "DE", "GE", "F", "GME", "AMC",
      "SPY", "QQQ", "COIN", "HOOD", "PLTR", "NIO", "SOFI", "RIVN", "LCID", "SNAP"
    ]
    additional_feeds:
      - url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=10000664"
        name: "cnbc_markets"
      - url: "https://feeds.marketwatch.com/marketwatch/topstories/"
        name: "marketwatch"
    language: "en"
  date_range:
    start: null
    end: null
    default_lookback_days: 7

labeling:
  aggregation_strategy: "confidence_weighted"  # "majority" | "weighted" | "confidence_weighted"
  confidence_threshold: 0.35
  min_votes: 1

model:
  max_features: 500
  ngram_range: [1, 2]
  min_df: 2
  C: 1.0
  class_weight: "balanced"
  test_size: 0.2
  random_state: 42

mcp_server:
  url: "http://localhost:8520/sse"
  timeout: 30
  rebalance_timeout: 120
