name: CI

# Runs on every push and PR to main. If you protect `main` and mark this check
# "required", a red run blocks the merge — so broken code never reaches the
# branch Streamlit deploys from.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "tasks/**"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Unit tests (offline)
        run: pytest -q

      - name: Page-render smoke (boots both Streamlit pages)
        run: python scripts/smoke_test.py
